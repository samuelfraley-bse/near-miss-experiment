<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard [DEV]</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #2c3e50; }

        .header { background: #2c3e50; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header .badge { background: #e74c3c; color: white; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 10px; }
        .export-all { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
        .btn { padding: 7px 14px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; }
        .btn-export { background: #27ae60; color: white; }
        .btn-export:hover { background: #219a52; }
        .btn-back { background: #7f8c8d; color: white; text-decoration: none; display: inline-flex; align-items: center; }
        .btn-back:hover { background: #6c7a89; }

        .content { padding: 24px; max-width: 1400px; margin: 0 auto; }

        .table-section { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; overflow: hidden; }
        .table-header { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #ecf0f1; }
        .table-header h2 { font-size: 15px; font-weight: 600; }
        .row-count { font-size: 12px; color: #7f8c8d; margin-left: 8px; font-weight: 400; }
        .dupe-count { font-size: 12px; color: #e74c3c; margin-left: 10px; font-weight: 500; }
        .table-wrapper { overflow-x: auto; max-height: 400px; overflow-y: auto; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { position: sticky; top: 0; z-index: 1; }
        th { background: #f8f9fa; padding: 10px 14px; text-align: left; font-weight: 600; font-size: 12px; color: #555; border-bottom: 2px solid #e9ecef; white-space: nowrap; }
        td { padding: 9px 14px; border-bottom: 1px solid #f1f3f4; white-space: nowrap; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9fa; }

        .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
        .pill-hit { background: #d5f5e3; color: #1e8449; }
        .pill-miss { background: #fde8e8; color: #c0392b; }
        .pill-near-miss { background: #fef9e7; color: #d68910; }
        .pill-true { background: #d5f5e3; color: #1e8449; }
        .pill-false { background: #f2f3f4; color: #7f8c8d; }
        .pill-dev { background: #ebdef0; color: #7d3c98; }

        .empty { padding: 40px; text-align: center; color: #aab; font-size: 14px; }
        .loading { padding: 40px; text-align: center; color: #aab; font-size: 14px; }
        .filter-bar { display: flex; align-items: center; gap: 8px; }
        .filter-input { padding: 5px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; width: 180px; }
        .dev-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #7f8c8d; }
        .dev-toggle input { cursor: pointer; }

        .analytics-wrap { padding: 16px 20px 22px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 14px; }
        .stat-card { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; }
        .stat-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; }
        .stat-value { font-size: 22px; font-weight: 700; color: #1f2937; margin-top: 3px; }

        .mini-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        .mini-table th, .mini-table td { border-bottom: 1px solid #edf2f7; padding: 7px 10px; text-align: left; font-size: 12px; }
        .mini-table th { background: #f8fafc; color: #4b5563; font-weight: 600; }

        .outcome-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 12px; }
        .chart-card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; background: #fff; }
        .chart-title { font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 8px; }
        .chart-bars { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; align-items: end; height: 170px; padding: 6px 4px 0; }
        .bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .bar-stack { width: 26px; height: 130px; border: 1px solid #e5e7eb; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column-reverse; background: #f9fafb; }
        .seg-hit { background: #22c55e; }
        .seg-near { background: #f59e0b; }
        .seg-loss { background: #ef4444; }
        .trial-label { font-size: 11px; color: #6b7280; }
        .trial-total { font-size: 10px; color: #9ca3af; }
        .chart-legend { display: flex; gap: 10px; margin-top: 8px; font-size: 11px; color: #4b5563; flex-wrap: wrap; }
        .legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; vertical-align: -1px; }

        .survey-section { margin-top: 24px; }
        .survey-section-title { font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 8px; border-bottom: 1px solid #e5e7eb; padding-bottom: 6px; }
        .survey-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
        .survey-card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px 10px; background: #fff; }
        .survey-card-title { font-size: 11px; font-weight: 600; color: #6b7280; margin-bottom: 6px; }
        .survey-bars { display: flex; align-items: flex-end; gap: 3px; height: 80px; padding-top: 4px; }
        .survey-bar-col { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
        .survey-bar { width: 100%; background: #6366f1; border-radius: 2px 2px 0 0; min-height: 1px; }
        .survey-bar-label { font-size: 9px; color: #9ca3af; }
        .survey-bar-count { font-size: 9px; color: #6b7280; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex; align-items:center;">
            <h1>Data Dashboard</h1>
            <span class="badge">DEV</span>
        </div>
        <div class="export-all">
            <label class="dev-toggle" style="color:white;">
                <input type="checkbox" id="hide-dev" checked> Hide DEV_ rows
            </label>
            <button class="btn btn-export" onclick="exportCSV('assignments')">-> assignments.csv</button>
            <button class="btn btn-export" onclick="exportCSV('trials')">-> trials.csv</button>
            <button class="btn btn-export" onclick="exportCSV('post_surveys')">-> post_surveys.csv</button>
            <button class="btn btn-export" onclick="exportCSV('summaries')">-> summaries.csv</button>
            <a href="/" class="btn btn-back"><- App</a>
        </div>
    </div>

    <div class="content">
        <div class="table-section">
            <div class="table-header">
                <div><h2>Assignments <span class="row-count" id="assignments-count"></span><span class="dupe-count" id="assignments-dupes"></span></h2></div>
                <div class="filter-bar">
                    <input class="filter-input" placeholder="Filter..." oninput="filterTable('assignments-table', this.value)">
                </div>
            </div>
            <div class="table-wrapper">
                <div class="loading" id="assignments-loading">Loading...</div>
                <table id="assignments-table" style="display:none">
                    <thead><tr id="assignments-head-row"></tr></thead>
                    <tbody id="assignments-body"></tbody>
                </table>
            </div>
        </div>

        <div class="table-section">
            <div class="table-header">
                <div><h2>Trials <span class="row-count" id="trials-count"></span></h2></div>
                <div class="filter-bar">
                    <input class="filter-input" placeholder="Filter..." oninput="filterTable('trials-table', this.value)">
                </div>
            </div>
            <div class="table-wrapper">
                <div class="loading" id="trials-loading">Loading...</div>
                <table id="trials-table" style="display:none">
                    <thead><tr id="trials-head-row"></tr></thead>
                    <tbody id="trials-body"></tbody>
                </table>
            </div>
        </div>

        <div class="table-section">
            <div class="table-header">
                <div><h2>Post Surveys <span class="row-count" id="surveys-count"></span><span class="dupe-count" id="surveys-dupes"></span></h2></div>
                <div class="filter-bar">
                    <input class="filter-input" placeholder="Filter..." oninput="filterTable('surveys-table', this.value)">
                </div>
            </div>
            <div class="table-wrapper">
                <div class="loading" id="surveys-loading">Loading...</div>
                <table id="surveys-table" style="display:none">
                    <thead><tr id="surveys-head-row"></tr></thead>
                    <tbody id="surveys-body"></tbody>
                </table>
            </div>
        </div>

        <div class="table-section">
            <div class="table-header">
                <div><h2>Summaries <span class="row-count" id="summaries-count"></span><span class="dupe-count" id="summaries-dupes"></span></h2></div>
                <div class="filter-bar">
                    <input class="filter-input" placeholder="Filter..." oninput="filterTable('summaries-table', this.value)">
                </div>
            </div>
            <div class="table-wrapper">
                <div class="loading" id="summaries-loading">Loading...</div>
                <table id="summaries-table" style="display:none">
                    <thead><tr id="summaries-head-row"></tr></thead>
                    <tbody id="summaries-body"></tbody>
                </table>
            </div>
        </div>

        <div class="table-section">
            <div class="table-header">
                <div><h2>Analytics <span class="row-count" id="analytics-count"></span></h2></div>
            </div>
            <div class="analytics-wrap">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Started Participants</div>
                        <div class="stat-value" id="stat-started">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Completed Participants</div>
                        <div class="stat-value" id="stat-completed">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Trial Rows</div>
                        <div class="stat-value" id="stat-trials">-</div>
                    </div>
                </div>

                <table class="mini-table" id="assignment-summary-table">
                    <thead>
                        <tr>
                            <th>condition_id</th>
                            <th>assigned</th>
                            <th>completed</th>
                            <th>completion_rate</th>
                        </tr>
                    </thead>
                    <tbody id="assignment-summary-body"></tbody>
                </table>

                <div class="outcome-grid" id="outcome-grid"></div>
                <div id="survey-histograms"></div>
            </div>
        </div>
    </div>

    <script>
        let allData = { assignments: [], trials: [], post_surveys: [], summaries: [] };
        let hideDev = true;
        const CONDITION_ORDER = ['skill_near_miss', 'skill_clear_loss', 'luck_near_miss', 'luck_clear_loss'];
        const SURVEY_QUESTIONS = [
            { key: 'desired_rounds_next_time', label: 'Desired rounds next time', min: 0, max: 5 },
            { key: 'improvement_confidence',   label: 'Confidence in improvement', min: 1, max: 7 },
            { key: 'learning_potential',        label: 'Learning potential', min: 1, max: 7 },
            { key: 'expected_success',          label: 'Expected successes / 10 rounds', min: 0, max: 10 },
            { key: 'app_download_likelihood',   label: 'App download likelihood', min: 1, max: 7 },
            { key: 'confidence_impact',         label: 'Control / confidence impact', min: 1, max: 7 },
            { key: 'feedback_credibility',      label: 'Feedback credibility', min: 1, max: 7 },
            { key: 'self_rated_accuracy',       label: 'Felt close to winning', min: 1, max: 7 },
            { key: 'final_round_closeness',     label: 'Final round closeness', min: 1, max: 7 },
            { key: 'frustration',               label: 'Frustration', min: 1, max: 7 },
            { key: 'motivation',                label: 'Motivation', min: 1, max: 7 },
            { key: 'luck_vs_skill',             label: 'Luck vs skill attribution', min: 1, max: 7 },
        ];
        const TABLE_CONFIG = {
            assignments: {
                countId: 'assignments-count',
                headRowId: 'assignments-head-row',
                bodyId: 'assignments-body',
                defaultColumns: ['participant_id', 'timestamp', 'start_time', 'end_time', 'condition_id', 'frame_type', 'loss_frame', 'is_dev', 'completed']
            },
            trials: {
                countId: 'trials-count',
                headRowId: 'trials-head-row',
                bodyId: 'trials-body',
                defaultColumns: ['participant_id', 'timestamp', 'condition_id', 'frame_type', 'loss_frame', 'trial_number', 'bar_position', 'target_zone_start', 'target_zone_end', 'distance_from_center', 'true_outcome', 'framed_outcome']
            },
            surveys: {
                countId: 'surveys-count',
                headRowId: 'surveys-head-row',
                bodyId: 'surveys-body',
                defaultColumns: ['participant_id', 'timestamp', 'condition_id', 'frame_type', 'loss_frame', 'wants_more_rounds', 'desired_rounds_next_time', 'improvement_confidence', 'learning_potential', 'expected_success', 'app_download_likelihood', 'confidence_impact', 'feedback_credibility', 'self_rated_accuracy', 'final_round_closeness', 'frustration', 'motivation', 'luck_vs_skill']
            },
            summaries: {
                countId: 'summaries-count',
                headRowId: 'summaries-head-row',
                bodyId: 'summaries-body',
                defaultColumns: ['participant_id', 'timestamp', 'condition_id', 'frame_type', 'loss_frame', 'trial_count', 'hits', 'near_misses', 'losses', 'age', 'gender', 'bdm_course_member']
            }
        };

        document.getElementById('hide-dev').addEventListener('change', function (e) {
            hideDev = e.target.checked;
            renderAll();
        });

        function outcomePill(v) {
            const cls = v === 'hit' ? 'pill-hit' : v === 'near_miss' ? 'pill-near-miss' : 'pill-miss';
            return `<span class="pill ${cls}">${v}</span>`;
        }

        function pidCell(v) {
            const cls = String(v).startsWith('DEV_') ? 'pill-dev' : '';
            return cls ? `<span class="pill ${cls}">${v}</span>` : v;
        }

        function filterRows(data) {
            return hideDev ? data.filter(r => !String(r.participant_id).startsWith('DEV_')) : data;
        }

        function formatValue(key, value) {
            if (key === 'participant_id') return pidCell(value);
            if (key === 'true_outcome' || key === 'framed_outcome') return outcomePill(value);
            if (typeof value === 'boolean') return value ? '<span class="pill pill-true">true</span>' : '<span class="pill pill-false">false</span>';
            if (value === null || value === undefined) return '';
            if (key === 'timestamp' || key === 'start_time' || key === 'end_time') return String(value).slice(0, 19);
            if (typeof value === 'number' && Number.isFinite(value)) {
                return Number.isInteger(value) ? String(value) : value.toFixed(2);
            }
            if (typeof value === 'object') return JSON.stringify(value);
            return String(value);
        }

        function resolveColumns(rows, defaultColumns) {
            const present = new Set();
            rows.forEach(r => Object.keys(r || {}).forEach(k => present.add(k)));
            const inDefault = defaultColumns.filter(c => present.has(c));
            const extras = Array.from(present).filter(c => !defaultColumns.includes(c)).sort();
            return [...inDefault, ...extras];
        }

        function renderTable(kind, rawRows) {
            const cfg = TABLE_CONFIG[kind];
            const rows = filterRows(rawRows);
            const body = document.getElementById(cfg.bodyId);
            const headRow = document.getElementById(cfg.headRowId);
            const countEl = document.getElementById(cfg.countId);

            countEl.textContent = `(${rows.length} rows)`;
            const columns = resolveColumns(rows, cfg.defaultColumns);
            headRow.innerHTML = columns.map(c => `<th>${c}</th>`).join('');

            if (!rows.length) {
                body.innerHTML = `<tr><td colspan="${Math.max(1, columns.length)}" class="empty">No data</td></tr>`;
                return;
            }

            body.innerHTML = rows.map(r => {
                const tds = columns.map(c => `<td>${formatValue(c, r[c])}</td>`).join('');
                return `<tr>${tds}</tr>`;
            }).join('');
        }

        function renderAll() {
            renderTable('assignments', allData.assignments);
            renderTable('trials', allData.trials);
            renderTable('surveys', allData.post_surveys);
            renderTable('summaries', allData.summaries);
            renderAnalytics();

            const aRows = filterRows(allData.assignments);
            const aDupes = getDupeCount(aRows);
            const aEl = document.getElementById('assignments-dupes');
            aEl.textContent = aDupes > 0 ? `+${aDupes} duplicate rows` : '';

            const sRows = filterRows(allData.post_surveys);
            const sDupes = getDupeCount(sRows);
            const sEl = document.getElementById('surveys-dupes');
            sEl.textContent = sDupes > 0 ? `+${sDupes} duplicate rows` : '';

            const sumRows = filterRows(allData.summaries);
            const sumDupes = getDupeCount(sumRows);
            const sumEl = document.getElementById('summaries-dupes');
            sumEl.textContent = sumDupes > 0 ? `+${sumDupes} duplicate rows` : '';
        }

        function getUniqueParticipantCount(rows) {
            return new Set(rows.map(r => String(r.participant_id))).size;
        }

        function getDupeCount(rows) {
            const counts = {};
            rows.forEach(r => { const id = String(r.participant_id); counts[id] = (counts[id] || 0) + 1; });
            return Object.values(counts).reduce((sum, c) => sum + (c > 1 ? c - 1 : 0), 0);
        }

        function conditionStats(assignments, summaries) {
            const assigned = Object.fromEntries(CONDITION_ORDER.map(c => [c, 0]));
            const completed = Object.fromEntries(CONDITION_ORDER.map(c => [c, 0]));

            assignments.forEach(r => {
                const cid = r.condition_id;
                if (cid in assigned) assigned[cid] += 1;
                if (cid in completed && r.completed === true) completed[cid] += 1;
            });

            if (assignments.length === 0) {
                summaries.forEach(r => {
                    const cid = r.condition_id;
                    if (cid in assigned) assigned[cid] += 1;
                    if (cid in completed) completed[cid] += 1;
                });
            }

            return { assigned, completed };
        }

        function renderAssignmentTable(assigned, completed) {
            const body = document.getElementById('assignment-summary-body');
            body.innerHTML = CONDITION_ORDER.map(cid => {
                const a = assigned[cid] || 0;
                const c = completed[cid] || 0;
                const pct = a > 0 ? ((c / a) * 100).toFixed(1) + '%' : '-';
                return `<tr><td>${cid}</td><td>${a}</td><td>${c}</td><td>${pct}</td></tr>`;
            }).join('');
        }

        function outcomeCountsByTrial(trials, conditionId) {
            const filtered = trials.filter(r => r.condition_id === conditionId);
            const out = [];
            for (let t = 1; t <= 5; t++) {
                const rows = filtered.filter(r => Number(r.trial_number) === t);
                const hit = rows.filter(r => r.framed_outcome === 'hit').length;
                const near = rows.filter(r => r.framed_outcome === 'near_miss').length;
                const loss = rows.filter(r => r.framed_outcome === 'loss').length;
                out.push({ trial: t, hit, near, loss, total: rows.length });
            }
            return out;
        }

        function renderOutcomeCharts(trials) {
            const grid = document.getElementById('outcome-grid');
            const cards = CONDITION_ORDER.map(cid => {
                const counts = outcomeCountsByTrial(trials, cid);
                const maxTotal = Math.max(1, ...counts.map(c => c.total));

                const bars = counts.map(c => {
                    const hHit = Math.round((c.hit / maxTotal) * 130);
                    const hNear = Math.round((c.near / maxTotal) * 130);
                    const hLoss = Math.round((c.loss / maxTotal) * 130);
                    return `
                        <div class="bar-col">
                            <div class="bar-stack" title="T${c.trial}: hit ${c.hit}, near_miss ${c.near}, miss ${c.loss}">
                                <div class="seg-hit" style="height:${hHit}px;"></div>
                                <div class="seg-near" style="height:${hNear}px;"></div>
                                <div class="seg-loss" style="height:${hLoss}px;"></div>
                            </div>
                            <div class="trial-label">T${c.trial}</div>
                            <div class="trial-total">n=${c.total}</div>
                        </div>`;
                }).join('');

                return `
                    <div class="chart-card">
                        <div class="chart-title">${cid} (framed outcomes)</div>
                        <div class="chart-bars">${bars}</div>
                        <div class="chart-legend">
                            <span><span class="legend-dot seg-hit"></span>hit</span>
                            <span><span class="legend-dot seg-near"></span>near_miss</span>
                            <span><span class="legend-dot seg-loss"></span>miss</span>
                        </div>
                    </div>
                `;
            }).join('');
            grid.innerHTML = cards;
        }

        function renderSurveyHistograms(surveys) {
            const container = document.getElementById('survey-histograms');
            if (!surveys.length) { container.innerHTML = ''; return; }

            const html = SURVEY_QUESTIONS.map(q => {
                const values = [];
                for (let v = q.min; v <= q.max; v++) values.push(v);

                const condCounts = Object.fromEntries(
                    CONDITION_ORDER.map(cid => {
                        const rows = surveys.filter(r => r.condition_id === cid);
                        const counts = Object.fromEntries(values.map(v => [v, 0]));
                        rows.forEach(r => { const val = Number(r[q.key]); if (val >= q.min && val <= q.max) counts[val]++; });
                        return [cid, { counts, n: rows.length }];
                    })
                );

                const globalMax = Math.max(1, ...CONDITION_ORDER.flatMap(cid => Object.values(condCounts[cid].counts)));

                const cards = CONDITION_ORDER.map(cid => {
                    const { counts, n } = condCounts[cid];
                    const bars = values.map(v => {
                        const cnt = counts[v];
                        const h = Math.round((cnt / globalMax) * 70);
                        return `<div class="survey-bar-col">
                            <div class="survey-bar-count">${cnt || ''}</div>
                            <div class="survey-bar" style="height:${h}px;" title="${q.key}=${v}: ${cnt}"></div>
                            <div class="survey-bar-label">${v}</div>
                        </div>`;
                    }).join('');
                    return `<div class="survey-card">
                        <div class="survey-card-title">${cid} (n=${n})</div>
                        <div class="survey-bars">${bars}</div>
                    </div>`;
                }).join('');

                return `<div class="survey-section">
                    <div class="survey-section-title">${q.label}</div>
                    <div class="survey-grid">${cards}</div>
                </div>`;
            }).join('');

            container.innerHTML = html;
        }

        function renderAnalytics() {
            const assignments = filterRows(allData.assignments);
            const trials = filterRows(allData.trials);
            const summaries = filterRows(allData.summaries);

            const started = assignments.length ? getUniqueParticipantCount(assignments) : getUniqueParticipantCount(summaries);
            const completed = assignments.length
                ? getUniqueParticipantCount(assignments.filter(r => r.completed === true))
                : getUniqueParticipantCount(summaries);

            document.getElementById('stat-started').textContent = started;
            document.getElementById('stat-completed').textContent = completed;
            document.getElementById('stat-trials').textContent = trials.length;
            document.getElementById('analytics-count').textContent = `(${trials.length} trial rows in view)`;

            const stats = conditionStats(assignments, summaries);
            renderAssignmentTable(stats.assigned, stats.completed);
            renderOutcomeCharts(trials);
            renderSurveyHistograms(filterRows(allData.post_surveys));
        }

        function filterTable(tableId, query) {
            const q = query.toLowerCase();
            document.querySelectorAll(`#${tableId} tbody tr`).forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        }

        function exportCSV(table) {
            window.location.href = `/api/export-csv?table=${table}`;
        }

        async function loadData() {
            const res = await fetch('/api/export-all-data');
            const json = await res.json();

            allData.assignments = json.data.filter(r => r.record_type === 'assignment');
            allData.trials = json.data.filter(r => r.record_type === 'trial');
            allData.post_surveys = json.data.filter(r => r.record_type === 'post_survey');
            allData.summaries = json.data.filter(r => r.record_type === 'summary');

            ['assignments', 'trials', 'surveys', 'summaries'].forEach(id => {
                document.getElementById(`${id}-loading`).style.display = 'none';
                const tableId = id === 'surveys' ? 'surveys-table' : `${id}-table`;
                document.getElementById(tableId).style.display = 'table';
            });

            renderAll();
        }

        loadData();
    </script>
</body>
</html>
